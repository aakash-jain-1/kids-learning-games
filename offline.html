<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Kids Learning Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Comic Sans MS',cursive,Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;color:#fff;}
.box{background:rgba(255,255,255,0.15);backdrop-filter:blur(12px);border-radius:24px;padding:40px 30px;max-width:420px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,0.2);}
.icon{font-size:4em;margin-bottom:16px;}
h1{font-size:1.8em;margin-bottom:12px;}
p{font-size:1.1em;opacity:0.9;line-height:1.6;margin-bottom:20px;}
button{background:linear-gradient(145deg,#4caf50,#2e7d32);color:#fff;border:none;padding:14px 36px;font-size:1.1em;font-weight:bold;border-radius:50px;cursor:pointer;font-family:inherit;box-shadow:0 6px 20px rgba(0,0,0,0.2);transition:0.2s;}
button:hover{transform:translateY(-2px);}
</style>
</head>
<body>
<div class="box">
  <div class="icon">📡</div>
  <h1>You're Offline!</h1>
  <p>It looks like you've lost your internet connection. Don't worry — try again when you're back online!</p>
  <button onclick="location.reload()">Try Again</button>
</div>
</body>
</html>

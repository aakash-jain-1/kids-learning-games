<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System Learning Game</title>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }
    body {
      font-family: 'Comic Sans MS', cursive, Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      text-align: center;
      margin: 0;
      padding: 100px 0 0 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      transition: all 0.3s ease;
    }
    body.dark-mode { background: linear-gradient(135deg, #000000 0%, #050314 100%); }
    body.font-small  { font-size: 14px; }
    body.font-medium { font-size: 16px; }
    body.font-large  { font-size: 18px; }

    .switch input:checked + span              { background-color: #4caf50; }
    .switch input:checked + span:before      { transform: translateX(26px); }
    .switch span:before {
      position: absolute; content: "";
      height: 26px; width: 26px; left: 4px; bottom: 4px;
      background-color: white; transition: 0.4s; border-radius: 50%;
    }

    @keyframes fadeIn     { from{opacity:0} to{opacity:1} }
    @keyframes fadeInUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes bounce {
      0%,20%,50%,80%,100% { transform:translateY(0); }
      40% { transform:translateY(-10px); }
      60% { transform:translateY(-5px); }
    }
    @keyframes flip3d {
      0%  { transform:rotateY(0deg); }
      50% { transform:rotateY(90deg); }
      100%{ transform:rotateY(0deg); }
    }
    @keyframes fadeInScale {
      from { opacity:0; transform:scale(.5); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.4; }
      50%     { opacity: 1; }
    }
    @keyframes spaceGlow {
      0%   { text-shadow: 2px 2px 4px rgba(0,0,0,.8), 0 0 20px rgba(247,201,72,.5); }
      100% { text-shadow: 2px 2px 4px rgba(0,0,0,.8), 0 0 50px rgba(247,201,72,.9); }
    }
    @keyframes pulse-glow {
      0%,100%{ box-shadow:0 0 20px rgba(247,201,72,.6),0 0 40px rgba(247,201,72,.4); }
      50%    { box-shadow:0 0 30px rgba(247,201,72,.8),0 0 60px rgba(247,201,72,.6); }
    }
    @keyframes confetti-fall {
      0%   { transform:translateY(0) rotateZ(0deg); opacity:1; }
      100% { transform:translateY(100vh) rotateZ(720deg); opacity:0; }
    }
    .ripple {
      position:absolute; border-radius:50%;
      background:rgba(247,201,72,.4); transform:scale(0);
      animation:ripple-animation .6s ease-out; pointer-events:none;
    }
    @keyframes ripple-animation { to{ transform:scale(4); opacity:0; } }

    /* Navigation */
    .navigation {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(0,0,0,.65); backdrop-filter: blur(10px);
      padding: 10px 15px;
      display: flex; justify-content: center; align-items: center;
      gap: 10px; flex-wrap: wrap;
    }
    .nav-btn {
      background: linear-gradient(135deg, #f7c948 0%, #e8a000 100%);
      border: none; border-radius: 8px; padding: 10px 20px;
      cursor: pointer; font-size: 1em; font-weight: 600; color: #0f0c29;
      transition: all .3s ease; text-decoration: none;
      box-shadow: 0 2px 5px rgba(0,0,0,.4);
    }
    .nav-btn:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(247,201,72,.5); }
    .nav-btn.active {
      background: linear-gradient(135deg, #fff 0%, #f7c948 100%);
      box-shadow: 0 4px 12px rgba(247,201,72,.8);
    }

    h1 {
      color: #f7c948;
      font-size: 3em;
      margin-top: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,.8), 0 0 30px rgba(247,201,72,.6);
      position: relative; z-index: 1;
      animation: spaceGlow 3s ease-in-out infinite alternate;
    }

    /* Control panel */
    .control-panel {
      display: flex; justify-content: center; align-items: center;
      gap: 15px; margin: 25px auto; padding: 15px;
      background: rgba(255,255,255,.05); backdrop-filter: blur(10px);
      border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
      border: 1px solid rgba(247,201,72,.3);
      max-width: 800px; position: relative; z-index: 10; flex-wrap: wrap;
    }
    .control-btn {
      background: linear-gradient(145deg, #1a1640, #0f0c29);
      border: 2px solid #f7c948; border-radius: 15px;
      padding: 12px 22px; font-size: 1.1em; font-weight: bold;
      color: #f7c948; cursor: pointer; transition: all .3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,.4); min-width: 110px;
      font-family: inherit;
    }
    .control-btn:hover:not(:disabled) {
      background: linear-gradient(145deg, #f7c948, #e8a000);
      color: #0f0c29; transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(247,201,72,.5);
    }
    .control-btn:active:not(:disabled) { transform:translateY(0); }
    .control-btn:disabled { opacity:.4; cursor:not-allowed; }
    .progress-counter {
      background:rgba(255,255,255,.08); border:2px solid #f7c948;
      border-radius:12px; padding:10px 20px; font-size:1.2em;
      font-weight:bold; color:#f7c948;
      box-shadow:0 4px 10px rgba(0,0,0,.3); min-width:150px;
    }

    /* Two-pane layout */
    .main-container {
      display: flex; justify-content: center; align-items: flex-start;
      gap: 40px; margin: 30px auto; padding: 0 20px;
      max-width: 1100px; height: 76vh; position: relative; z-index: 1;
    }
    .left-pane {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,.04); backdrop-filter: blur(10px);
      border-radius: 20px; padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      border: 1px solid rgba(247,201,72,.2);
      max-height: 76vh; overflow-y: auto;
    }
    .right-pane {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-width: 340px;
      background: rgba(255,255,255,.06); backdrop-filter: blur(10px);
      border-radius: 20px; padding: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      border: 1px solid rgba(247,201,72,.2);
      position: relative; overflow-y: auto;
    }

    /* Item grid */
    .items-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 12px; width: 100%; margin-top: 15px;
    }
    .item-btn {
      background: linear-gradient(145deg, #1a1640, #0f0c29);
      border: 2px solid #f7c948; border-radius: 15px;
      font-size: 1em; font-weight: bold; padding: 14px 6px;
      cursor: pointer; transition: all .3s ease; width: 100%;
      box-shadow: 0 4px 12px rgba(0,0,0,.4); color: #f7c948;
      position: relative; overflow: hidden; min-height: 68px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 5px; font-family: inherit;
    }
    .item-btn .btn-emoji { font-size: 1.9em; line-height: 1; }
    .item-btn .btn-name  { font-size: 0.82em; color: rgba(255,255,255,.9); }
    .item-btn.flipping { animation: flip3d .6s ease-in-out; }
    .item-btn:hover {
      background: linear-gradient(145deg, #f7c948, #e8a000);
      color: #0f0c29; transform: translateY(-4px) scale(1.04);
      box-shadow: 0 10px 28px rgba(247,201,72,.5);
    }
    .item-btn:hover .btn-name { color: #0f0c29; }
    .item-btn:active { transform:translateY(0) scale(.96); }
    .item-btn.learned {
      background: linear-gradient(145deg, #1b3a2a, #0d2518);
      border-color: #4caf50;
    }
    .item-btn.learned .btn-emoji::after {
      content: ' ✓'; font-size: .45em; vertical-align: super; color:#4caf50;
    }

    /* Right pane display */
    .item-name {
      font-size: clamp(2em, 5vmin, 3.5em); font-weight: bold;
      color: #f7c948; text-align: center; margin-bottom: 12px;
      text-shadow: 0 0 20px rgba(247,201,72,.6);
    }
    .item-image {
      width: 200px; height: 200px; border-radius: 20px;
      padding: 10px; object-fit: contain;
      animation: fadeInScale .8s ease-out;
      filter: drop-shadow(0 0 18px rgba(247,201,72,.5));
    }
    .item-badge {
      display: inline-block;
      background: rgba(247,201,72,.15); border: 1px solid #f7c948;
      border-radius: 20px; padding: 6px 18px;
      color: #f7c948; font-size: 1em; font-weight: bold; margin: 12px 0;
    }
    .item-fact {
      font-size: 1.15em; color: rgba(255,255,255,.92);
      margin-top: 10px; line-height: 1.65; max-width: 360px; text-align: center;
    }
    .prompt-text {
      color: rgba(255,255,255,.45); font-size: 1.4em;
      animation: twinkle 2s ease-in-out infinite;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main-container { flex-direction: column !important; height: auto !important; gap: 20px !important; }
      .items-grid     { grid-template-columns: repeat(3,1fr) !important; gap: 8px !important; }
      .right-pane     { min-width: unset !important; width: 100% !important; }
      .left-pane      { max-height: none !important; overflow-y: visible !important; }
      h1 { font-size: 2em !important; }
    }
    @media (max-width: 600px) {
      body { padding-top: 52px !important; }
      .navigation { padding:6px 8px; flex-wrap:nowrap; overflow-x:auto; justify-content:flex-start; -webkit-overflow-scrolling:touch; }
      .nav-btn    { padding:6px 10px; font-size:.76em; white-space:nowrap; flex-shrink:0; }
      .control-btn { min-width:unset !important; padding:8px 12px !important; font-size:.88em !important; }
      .items-grid  { grid-template-columns: repeat(2,1fr) !important; }
    }

    /* Disable heavy bg animations for performance */
    body::before { display: none; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <div class="navigation">
    <a href="../index.html"              class="nav-btn">🏠 Home</a>
    <a href="alphabet-game.html"         class="nav-btn">Alphabets</a>

  <h1>🪐 Learn Solar System 🌟</h1>

  <!-- Control panel -->
  <div class="control-panel">
    <button id="randomBtn"   class="control-btn">🎲 Random</button>
    <button id="quizBtn"     class="control-btn" style="background:linear-gradient(145deg,#1a1640,#0f0c29);border:2px solid #ff9800;color:#ff9800;">🎯 Quiz</button>
    <button id="settingsBtn" class="control-btn" style="background:linear-gradient(145deg,#1a1640,#0f0c29);border:2px solid #9c27b0;color:#9c27b0;">⚙️ Settings</button>
    <button id="speakBtn"    class="control-btn" disabled>🔊 Speak</button>
    <button id="resetBtn"    class="control-btn">🔄 Reset</button>
    <button id="statsBtn"    style="background:linear-gradient(135deg,#2196f3,#1976d2);border:none;padding:12px 28px;border-radius:25px;font-size:1.1em;font-weight:bold;cursor:pointer;box-shadow:0 4px 15px rgba(33,150,243,.4);color:white;transition:all .3s;font-family:inherit;">📊 Stats</button>
    <div class="progress-counter" id="progressCounter" aria-live="polite">0 / 11 explored</div>
  </div>

  <!-- Quiz Modal -->
  <div id="quizModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.86);backdrop-filter:blur(10px);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:linear-gradient(145deg,#0f0c29,#302b63);border:2px solid #f7c948;padding:30px;border-radius:25px;max-width:600px;width:90%;box-shadow:0 10px 50px rgba(247,201,72,.25);position:relative;">
      <button id="closeQuiz" style="position:absolute;top:15px;right:15px;background:rgba(247,201,72,.2);border:none;font-size:2em;cursor:pointer;border-radius:50%;width:45px;height:45px;line-height:45px;padding:0;color:#f7c948;font-family:inherit;">×</button>
      <h2 style="color:#f7c948;font-size:2em;margin-bottom:20px;">🎯 Solar System Quiz</h2>
      <div style="margin:15px 0;">
        <img id="quizItemImage" src="" alt="" style="width:150px;height:150px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,.5);padding:12px;filter:drop-shadow(0 0 15px rgba(247,201,72,.4));">
      </div>
      <p id="quizQuestion" style="color:white;font-size:1.4em;margin:12px 0;">What is this?</p>
      <div id="quizOptions" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;"></div>
      <p id="quizFeedback" style="font-size:1.2em;font-weight:bold;margin:10px 0;min-height:28px;"></p>
      <div id="quizScore" style="color:#f7c948;font-size:1.1em;margin:10px 0;font-weight:bold;"></div>
      <button id="nextQuizBtn" style="display:none;background:linear-gradient(145deg,#f7c948,#e8a000);border:none;padding:13px 35px;border-radius:25px;font-size:1.2em;font-weight:bold;color:#0f0c29;cursor:pointer;margin-top:10px;font-family:inherit;">Next →</button>
    </div>
  </div>

  <!-- Stats Modal -->
  <div id="statsModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.86);backdrop-filter:blur(10px);z-index:1000;justify-content:center;align-items:center;overflow-y:auto;">
    <div style="background:linear-gradient(135deg,#1a1640,#302b63);border:2px solid #2196f3;padding:30px;border-radius:20px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto;margin:20px auto;">
      <h2 style="color:white;margin-bottom:20px;text-align:center;">📊 Your Statistics</h2>
      <div id="statsContent"></div>
      <h3 style="color:white;margin:28px 0 14px;text-align:center;">🏆 Achievements</h3>
      <div id="achievementsList" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;"></div>
      <button id="closeStats" style="width:100%;padding:15px;background:white;color:#1976d2;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:18px;font-family:inherit;">Close</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.86);backdrop-filter:blur(10px);z-index:1000;justify-content:center;align-items:center;">
    <div style="background:linear-gradient(135deg,#0f0c29,#302b63);border:2px solid #f7c948;border-radius:30px;padding:40px;max-width:500px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.7);position:relative;">
      <button id="closeSettings" style="position:absolute;top:15px;right:15px;background:rgba(247,201,72,.2);border:none;color:#f7c948;font-size:24px;width:40px;height:40px;border-radius:50%;cursor:pointer;font-family:inherit;">✕</button>
      <h2 style="color:#f7c948;margin-bottom:30px;text-align:center;">⚙️ Settings</h2>
      <div style="background:rgba(255,255,255,.05);padding:25px;border-radius:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;padding-bottom:20px;border-bottom:1px solid rgba(247,201,72,.3);">
          <label style="color:white;font-size:1.2em;font-weight:bold;">🌙 Dark Mode</label>
          <label class="switch" style="position:relative;display:inline-block;width:60px;height:34px;">
            <input type="checkbox" id="darkModeToggle" style="opacity:0;width:0;height:0;">
            <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#555;transition:.4s;border-radius:34px;"></span>
          </label>
        </div>
        <div style="margin-bottom:25px;padding-bottom:20px;border-bottom:1px solid rgba(247,201,72,.3);">
          <label style="color:white;font-size:1.2em;font-weight:bold;display:block;margin-bottom:15px;">📏 Font Size</label>
          <div style="display:flex;gap:10px;justify-content:center;">
            <button class="fontSizeBtn" data-size="small"  style="background:rgba(247,201,72,.15);border:2px solid #f7c948;color:#f7c948;padding:10px 20px;border-radius:15px;cursor:pointer;font-size:.9em;font-family:inherit;">Small</button>
            <button class="fontSizeBtn active" data-size="medium" style="background:#f7c948;border:2px solid #f7c948;color:#0f0c29;padding:10px 20px;border-radius:15px;cursor:pointer;font-size:1em;font-weight:bold;font-family:inherit;">Medium</button>
            <button class="fontSizeBtn" data-size="large"  style="background:rgba(247,201,72,.15);border:2px solid #f7c948;color:#f7c948;padding:10px 20px;border-radius:15px;cursor:pointer;font-size:1.1em;font-family:inherit;">Large</button>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;padding-bottom:20px;border-bottom:1px solid rgba(247,201,72,.3);">
          <label style="color:white;font-size:1.2em;font-weight:bold;">🔊 Sound Effects</label>
          <label class="switch" style="position:relative;display:inline-block;width:60px;height:34px;">
            <input type="checkbox" id="soundToggle" checked style="opacity:0;width:0;height:0;">
            <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#4caf50;transition:.4s;border-radius:34px;"></span>
          </label>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <label style="color:white;font-size:1.2em;font-weight:bold;">🗣️ Auto-Speak</label>
          <label class="switch" style="position:relative;display:inline-block;width:60px;height:34px;">
            <input type="checkbox" id="autoSpeakToggle" style="opacity:0;width:0;height:0;">
            <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#555;transition:.4s;border-radius:34px;"></span>
          </label>
        </div>
      </div>
      <button onclick="document.getElementById('settingsModal').style.display='none'" style="background:linear-gradient(145deg,#f7c948,#e8a000);border:none;padding:15px 40px;border-radius:25px;font-size:1.2em;font-weight:bold;color:#0f0c29;cursor:pointer;margin-top:25px;width:100%;font-family:inherit;">✓ Save Settings</button>
    </div>
  </div>

  <!-- Main two-pane layout -->
  <div class="main-container">
    <div class="left-pane">
      <div class="items-grid" id="itemsGrid"></div>
    </div>
    <div class="right-pane">
      <div class="prompt-text" id="promptText">☝️ Pick an object to explore!</div>
      <div id="itemDisplayContainer" style="display:none;flex-direction:column;align-items:center;">
        <div class="item-name"  id="itemName"></div>
        <img class="item-image" id="itemImage" src="" alt="">
        <div class="item-badge" id="itemBadge"></div>
        <div class="item-fact"  id="itemFact"></div>
      </div>
    </div>
  </div>

      'Neptune': {
        img:   'https://api.iconify.design/noto/blue-circle.svg?width=120&height=120',
        emoji: '🌀',
        badge: '🌬️ 8th Planet · Farthest Planet',
        fact:  'Neptune is the farthest planet from the Sun. It has the strongest winds in the Solar System — up to 2,100 km per hour!'
      },
      'Moon': {
        img:   'https://api.iconify.design/noto/full-moon.svg?width=120&height=120',
        emoji: '🌕',
        badge: "🌍 Earth's Natural Satellite",
        fact:  "The Moon is Earth's only natural satellite. In 1969, astronauts first walked on it — a giant leap for humankind!"
      },
      'Pluto': {
        img:   'https://api.iconify.design/noto/last-quarter-moon.svg?width=120&height=120',
        emoji: '🌗',
        badge: '🧊 Dwarf Planet · Kuiper Belt',
        fact:  "Pluto was once the 9th planet, but in 2006 it was reclassified as a dwarf planet. It is smaller than Earth's Moon!"
      }
    };

    const itemNames   = Object.keys(items);
    let currentItem   = '';
    let learnedItems  = new Set(JSON.parse(localStorage.getItem(GAME_KEY + '_learned') || '[]'));
    let soundEnabled  = true;
    let autoSpeak     = false;

    // DOM refs
    const itemsGrid            = document.getElementById('itemsGrid');
    const itemName             = document.getElementById('itemName');
    const itemImage            = document.getElementById('itemImage');
    const itemDisplayContainer = document.getElementById('itemDisplayContainer');
    const itemFact             = document.getElementById('itemFact');
    const itemBadge            = document.getElementById('itemBadge');
    const promptText           = document.getElementById('promptText');
    const progressCounter      = document.getElementById('progressCounter');
    const speakBtn             = document.getElementById('speakBtn');
    const randomBtn            = document.getElementById('randomBtn');
    const resetBtn             = document.getElementById('resetBtn');

    // ── SPEECH ───────────────────────────────────────────
    function speak(text) {
      if (!soundEnabled) return;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.rate = 0.85; utt.pitch = 1.1; utt.volume = 1;
        window.speechSynthesis.speak(utt);
      }
    }

    // ── DISPLAY ITEM ─────────────────────────────────────
    function displayItem(name) {
      currentItem = name;
      const data  = items[name];

      promptText.style.display = 'none';
      itemDisplayContainer.style.display = 'flex';

      itemName.textContent = name;
      itemName.style.animation = 'none';
      void itemName.offsetHeight;
      itemName.style.animation = 'bounce .6s ease-in-out';

      itemBadge.textContent = data.badge;
      itemFact.textContent  = data.fact;

      itemImage.src = data.img;
      itemImage.alt = name;
      itemImage.style.animation = 'none';
      void itemImage.offsetHeight;
      itemImage.style.animation = 'fadeInScale .8s ease-out';
      itemImage.onerror = () => {
        itemImage.src = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><text x="50%" y="50%" text-anchor="middle" dy=".3em" font-size="86">${data.emoji}</text></svg>`;
      };

      speakBtn.disabled = false;
      learnedItems.add(name);
      localStorage.setItem(GAME_KEY + '_learned', JSON.stringify([...learnedItems]));
      updateProgress();
      checkAchievements();
      renderGrid();
      if (autoSpeak) speak(name);
    }

    function updateProgress() {
      progressCounter.textContent = learnedItems.size + ' / ' + TOTAL_ITEMS + ' explored';
    }

    // ── RENDER GRID ──────────────────────────────────────
    function renderGrid() {
      itemsGrid.innerHTML = '';
      itemNames.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'item-btn' + (learnedItems.has(name) ? ' learned' : '');
        btn.setAttribute('aria-label', 'Explore ' + name);
        btn.innerHTML = `<span class="btn-emoji">${items[name].emoji}</span><span class="btn-name">${name}</span>`;
        btn.addEventListener('click', (e) => {
          createRipple(e);
          btn.classList.add('flipping');
          setTimeout(() => btn.classList.remove('flipping'), 600);
          displayItem(name);
        });
        itemsGrid.appendChild(btn);
      });
    }

    // ── RIPPLE ───────────────────────────────────────────
    function createRipple(e) {
      const btn  = e.currentTarget;
      const rect = btn.getBoundingClientRect();
      const rip  = document.createElement('span');
      const size = Math.max(rect.width, rect.height);
      rip.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px;`;
      rip.classList.add('ripple');
      btn.appendChild(rip);
      setTimeout(() => rip.remove(), 600);
    }

    // ── CONTROLS ─────────────────────────────────────────
    randomBtn.addEventListener('click', () => {
      displayItem(itemNames[Math.floor(Math.random() * TOTAL_ITEMS)]);
    });

    speakBtn.addEventListener('click', () => { if (currentItem) speak(currentItem); });

    resetBtn.addEventListener('click', () => {
      if (confirm('Reset all Solar System progress?')) {
        learnedItems.clear();
        localStorage.removeItem(GAME_KEY + '_learned');
        localStorage.removeItem(GAME_KEY + '_stats');
        localStorage.removeItem(GAME_KEY + '_achievements');
        currentItem = '';
        itemDisplayContainer.style.display = 'none';
        promptText.style.display = 'block';
        speakBtn.disabled = true;
        updateProgress();
        renderGrid();
      }
    });

    // ── QUIZ ─────────────────────────────────────────────
    const quizModal    = document.getElementById('quizModal');
    const closeQuiz    = document.getElementById('closeQuiz');
    const quizOptions  = document.getElementById('quizOptions');
    const quizFeedback = document.getElementById('quizFeedback');
    const quizScore    = document.getElementById('quizScore');
    const nextQuizBtn  = document.getElementById('nextQuizBtn');
    const quizImgEl    = document.getElementById('quizItemImage');
    const quizBtn      = document.getElementById('quizBtn');

    let quizState = { current: null, correct: 0, totalQs: 0, idx: 0, answered: false };

    function startQuiz() {
      quizState = { current: null, correct: 0, totalQs: Math.min(10, TOTAL_ITEMS), idx: 0, answered: false };
      quizModal.style.display = 'flex';
      loadQuizQuestion();
    }

    function loadQuizQuestion() {
      quizState.answered = false;
      quizFeedback.textContent = '';
      nextQuizBtn.style.display = 'none';
      quizScore.textContent = `Question ${quizState.idx + 1} / ${quizState.totalQs}  ·  Score: ${quizState.correct}`;

      const shuffled = [...itemNames].sort(() => Math.random() - .5);
      const answer   = shuffled[0];
      const choices  = shuffled.slice(0, 4).sort(() => Math.random() - .5);
      quizState.current = answer;

      quizImgEl.src = items[answer].img;
      quizImgEl.onerror = () => {
        quizImgEl.src = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><text x="50%" y="50%" text-anchor="middle" dy=".3em" font-size="86">${items[answer].emoji}</text></svg>`;
      };

      quizOptions.innerHTML = '';
      choices.forEach(choice => {
        const opt = document.createElement('button');
        opt.textContent = choice;
        opt.style.cssText = 'padding:13px;font-size:1.1em;border-radius:15px;border:2px solid #f7c948;background:rgba(247,201,72,.1);color:#f7c948;cursor:pointer;transition:all .3s;font-weight:bold;font-family:inherit;';
        opt.addEventListener('click', () => checkAnswer(choice, opt));
        opt.addEventListener('mouseover', () => { if (!quizState.answered) opt.style.background = 'rgba(247,201,72,.3)'; });
        opt.addEventListener('mouseout',  () => { if (!quizState.answered && !opt.dataset.selected) opt.style.background = 'rgba(247,201,72,.1)'; });
        quizOptions.appendChild(opt);
      });
    }

    function checkAnswer(choice, btn) {
      if (quizState.answered) return;
      quizState.answered = true;
      btn.dataset.selected = '1';
      const correct = choice === quizState.current;
      if (correct) {
        quizState.correct++;
        quizFeedback.innerHTML = '✅ <span style="color:#4caf50">Correct! Well done!</span>';
        btn.style.cssText += 'background:#4caf50;border-color:#4caf50;color:white;';
      } else {
        quizFeedback.innerHTML = `❌ <span style="color:#f44336">It's ${quizState.current}!</span>`;
        btn.style.cssText += 'background:#f44336;border-color:#f44336;color:white;';
        quizOptions.querySelectorAll('button').forEach(b => {
          if (b.textContent === quizState.current) b.style.cssText += 'background:#4caf50;border-color:#4caf50;color:white;';
        });
      }
      quizState.idx++;
      if (quizState.idx < quizState.totalQs) {
        nextQuizBtn.style.display = 'inline-block';
      } else {
        setTimeout(showQuizResults, 900);
      }
    }

    function showQuizResults() {
      const pct  = Math.round((quizState.correct / quizState.totalQs) * 100);
      const star = pct === 100 ? '🌟' : pct >= 70 ? '⭐' : '🚀';
      quizOptions.innerHTML = '';
      quizImgEl.src = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><text x="50%" y="50%" text-anchor="middle" dy=".3em" font-size="86">${star}</text></svg>`;
      quizFeedback.textContent = '';
      nextQuizBtn.style.display = 'none';
      const msg = pct === 100 ? 'Perfect! You are a Space Explorer! 🚀'
                : pct >= 70  ? 'Great job! Keep exploring the cosmos!'
                :               'Keep learning — the universe awaits!';
      quizScore.innerHTML = `
        <div style="font-size:1.7em;color:#f7c948;margin-bottom:8px;">${star} Quiz Complete!</div>
        <div style="font-size:1.3em;color:white;">Score: ${quizState.correct} / ${quizState.totalQs} (${pct}%)</div>
        <div style="font-size:.95em;color:rgba(255,255,255,.7);margin-top:8px;">${msg}</div>`;
      const rb = document.createElement('button');
      rb.textContent = '🔄 Play Again';
      rb.style.cssText = 'margin-top:14px;padding:12px 30px;font-size:1.1em;font-weight:bold;background:linear-gradient(145deg,#f7c948,#e8a000);border:none;border-radius:20px;cursor:pointer;color:#0f0c29;font-family:inherit;display:block;margin-left:auto;margin-right:auto;';
      rb.addEventListener('click', startQuiz);
      quizScore.appendChild(rb);
    }

    quizBtn.addEventListener('click', startQuiz);
    closeQuiz.addEventListener('click', () => { quizModal.style.display = 'none'; });
    quizModal.addEventListener('click',  (e) => { if (e.target === quizModal) quizModal.style.display = 'none'; });
    nextQuizBtn.addEventListener('click', loadQuizQuestion);

    // ── SETTINGS ─────────────────────────────────────────
    document.getElementById('settingsBtn').addEventListener('click', () => { document.getElementById('settingsModal').style.display = 'flex'; });
    document.getElementById('closeSettings').addEventListener('click', () => { document.getElementById('settingsModal').style.display = 'none'; });
    document.getElementById('darkModeToggle').addEventListener('change', (e) => { document.body.classList.toggle('dark-mode', e.target.checked); });
    document.getElementById('soundToggle').addEventListener('change', (e) => { soundEnabled = e.target.checked; });
    document.getElementById('autoSpeakToggle').addEventListener('change', (e) => { autoSpeak = e.target.checked; });
    document.querySelectorAll('.fontSizeBtn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.fontSizeBtn').forEach(x => {
          x.style.background = 'rgba(247,201,72,.15)'; x.style.color = '#f7c948'; x.style.fontWeight = 'normal';
        });
        b.style.background = '#f7c948'; b.style.color = '#0f0c29'; b.style.fontWeight = 'bold';
        document.body.className = document.body.className.replace(/font-\w+/g, '');
        document.body.classList.add('font-' + b.dataset.size);
      });
    });

    // ── ACHIEVEMENTS & STATS ─────────────────────────────
    const achievements = {
      first_explore: { name: '🚀 First Launch',    desc: 'Explore your first object',   unlocked: false },
      halfway:       { name: '🌗 Deep Space',       desc: 'Explore 6 or more objects',   unlocked: false },
      all_explored:  { name: '🌌 Universe Master',  desc: 'Explore all 11 objects',      unlocked: false },
      perfect_quiz:  { name: '💯 Perfect Score',    desc: 'Score 100% in a quiz',        unlocked: false },
      quiz_master:   { name: '🎓 Quiz Master',      desc: 'Complete 10 quizzes',         unlocked: false }
    };
    const savedAch = JSON.parse(localStorage.getItem(GAME_KEY + '_achievements') || '{}');
    Object.keys(savedAch).forEach(k => { if (achievements[k]) achievements[k].unlocked = savedAch[k]; });
    let stats = JSON.parse(localStorage.getItem(GAME_KEY + '_stats') || '{"totalQuizzes":0,"totalCorrect":0,"totalQuestions":0,"highScore":0}');

    function saveAchievements() {
      const out = {}; Object.keys(achievements).forEach(k => { out[k] = achievements[k].unlocked; });
      localStorage.setItem(GAME_KEY + '_achievements', JSON.stringify(out));
    }
    function saveStats() { localStorage.setItem(GAME_KEY + '_stats', JSON.stringify(stats)); }

    function showAchievementBadge(ach) {
      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#ffd700,#ffed4e);color:#333;padding:20px 30px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:10001;font-weight:bold;border:3px solid #ff8800;';
      el.innerHTML = `<div style="font-size:1.5em;margin-bottom:5px;">${ach.name}</div><div style="font-size:.9em;opacity:.8;">${ach.desc}</div>`;
      document.body.appendChild(el);
      if (!document.getElementById('achAnimStyle')) {
        const s = document.createElement('style'); s.id = 'achAnimStyle';
        s.textContent = '@keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}';
        document.head.appendChild(s);
      }
      el.style.animation = 'slideIn .5s ease-out';
      speak('Achievement unlocked: ' + ach.name.replace(/[^\w\s]/g, ''));
      setTimeout(() => { el.style.transition = 'all .5s'; el.style.transform = 'translateX(400px)'; el.style.opacity = '0'; setTimeout(() => el.remove(), 500); }, 3000);
    }

    function checkAchievements() {
      let changed = false;
      if (!achievements.first_explore.unlocked && learnedItems.size >= 1)               { achievements.first_explore.unlocked = true; showAchievementBadge(achievements.first_explore); changed = true; }
      if (!achievements.halfway.unlocked       && learnedItems.size >= 6)               { achievements.halfway.unlocked = true;       showAchievementBadge(achievements.halfway);       changed = true; }
      if (!achievements.all_explored.unlocked  && learnedItems.size >= TOTAL_ITEMS)     { achievements.all_explored.unlocked = true;  showAchievementBadge(achievements.all_explored);  changed = true; }
      if (changed) saveAchievements();
    }

    // Stats modal
    document.getElementById('statsBtn').addEventListener('click', () => {
      const s2  = JSON.parse(localStorage.getItem(GAME_KEY + '_stats') || '{"totalQuizzes":0,"totalCorrect":0,"totalQuestions":0,"highScore":0}');
      const acc = s2.totalQuestions > 0 ? ((s2.totalCorrect / s2.totalQuestions) * 100).toFixed(1) : 0;
      document.getElementById('statsContent').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;color:white;font-size:16px;">
          <div style="background:rgba(255,255,255,.1);padding:14px;border-radius:10px;"><div style="font-size:22px;margin-bottom:4px;">🌍 ${learnedItems.size}/${TOTAL_ITEMS}</div><div>Objects Explored</div></div>
          <div style="background:rgba(255,255,255,.1);padding:14px;border-radius:10px;"><div style="font-size:22px;margin-bottom:4px;">📝 ${s2.totalQuizzes}</div><div>Quizzes Taken</div></div>
          <div style="background:rgba(255,255,255,.1);padding:14px;border-radius:10px;"><div style="font-size:22px;margin-bottom:4px;">✅ ${acc}%</div><div>Accuracy</div></div>
          <div style="background:rgba(255,255,255,.1);padding:14px;border-radius:10px;"><div style="font-size:22px;margin-bottom:4px;">🏆 ${s2.highScore}%</div><div>High Score</div></div>
        </div>`;
      const achList = document.getElementById('achievementsList');
      achList.innerHTML = '';
      Object.values(achievements).forEach(a => {
        const d = document.createElement('div');
        d.style.cssText = `background:${a.unlocked ? 'linear-gradient(135deg,#ffd700,#ffed4e)' : 'rgba(255,255,255,.08)'};padding:18px;border-radius:15px;text-align:center;opacity:${a.unlocked ? 1 : .5};`;
        d.innerHTML = `<div style="font-size:40px;margin-bottom:7px;">${a.name.split(' ')[0]}</div><div style="font-weight:bold;font-size:14px;color:${a.unlocked ? '#000' : '#fff'};">${a.name.substring(a.name.indexOf(' ') + 1)}</div><div style="font-size:12px;color:${a.unlocked ? '#333' : '#aaa'};margin-top:4px;">${a.desc}</div>${a.unlocked ? '<div style="margin-top:7px;color:#000;font-weight:bold;font-size:12px;">✓ UNLOCKED</div>' : '<div style="margin-top:7px;color:#666;font-size:12px;">🔒 Locked</div>'}`;
        achList.appendChild(d);
      });
      document.getElementById('statsModal').style.display = 'flex';
    });
    document.getElementById('closeStats').addEventListener('click', () => { document.getElementById('statsModal').style.display = 'none'; });
    document.getElementById('statsModal').addEventListener('click', (e) => { if (e.target === document.getElementById('statsModal')) document.getElementById('statsModal').style.display = 'none'; });

    // Hook quiz results into stats
    const _origShowResults = showQuizResults;
    showQuizResults = function() {
      stats.totalQuizzes++;
      stats.totalCorrect   += quizState.correct;
      stats.totalQuestions += quizState.totalQs;
      const pct = (quizState.correct / quizState.totalQs) * 100;
      if (pct > stats.highScore) stats.highScore = Math.round(pct);
      if (pct === 100 && !achievements.perfect_quiz.unlocked) {
        achievements.perfect_quiz.unlocked = true;
        setTimeout(() => showAchievementBadge(achievements.perfect_quiz), 1000);
        saveAchievements();
      }
      if (stats.totalQuizzes >= 10 && !achievements.quiz_master.unlocked) {
        achievements.quiz_master.unlocked = true;
        setTimeout(() => showAchievementBadge(achievements.quiz_master), 1500);
        saveAchievements();
      }
      saveStats();
      _origShowResults();
    };

    // ── INIT ─────────────────────────────────────────────
    renderGrid();
    updateProgress();
    checkAchievements();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../service-worker.js');
      let r = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => { if (!r) { r = true; location.reload(); } });
    }
  </script>

  <div id="build-info" style="text-align:center;padding:10px 10px 20px;font-size:.7em;color:rgba(255,255,255,.25);"></div>
  <script>
    fetch('https://api.github.com/repos/aakash-jain-1/kids-learning-games/commits/main')
      .then(r => r.json())
      .then(d => { document.getElementById('build-info').textContent = 'Build: ' + d.sha.slice(0, 7) + ' · ' + d.commit.committer.date.slice(0, 10); })
      .catch(() => {});
  </script>
</body>
</html>
